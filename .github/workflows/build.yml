name: Build strongR-frida

on:
  workflow_dispatch:
    inputs:
      FRIDA_VERSION:
        description: 'Frida version'
        required: true
        default: '17.9.1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Download frida-server
      run: |
        FRIDA_VER="${{ github.event.inputs.FRIDA_VERSION }}"
        echo "=== Downloading frida-server ${FRIDA_VER} ==="

        # strongR-frida releases (pre-patched anti-detection version)
        BASE_URL="https://github.com/hzzheyang/strongR-frida-android/releases/download"

        # Download pre-patched frida-server
        echo "Downloading from: ${BASE_URL}/${FRIDA_VER}/frida-server-${FRIDA_VER}-android-arm64.xz"
        curl -L -o frida-server.xz "${BASE_URL}/${FRIDA_VER}/frida-server-${FRIDA_VER}-android-arm64.xz" || {
          echo "Failed with version ${FRIDA_VER}, trying fallback 17.9.1..."
          curl -L -o frida-server.xz "${BASE_URL}/17.9.1/frida-server-17.9.1-android-arm64.xz"
        }

        # Check file
        ls -la frida-server.xz
        file frida-server.xz

        # Decompress
        unxz frida-server.xz || xz -d frida-server.xz

        # Rename
        mv frida-server frida-server-strongR-arm64

        # Final check
        ls -la frida-server-strongR-arm64
        chmod +x frida-server-strongR-arm64

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: frida-server-strongR-arm64
        path: frida-server-strongR-arm64
        retention-days: 30