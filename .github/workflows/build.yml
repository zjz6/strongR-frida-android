name: Build strongR-frida

  on:
    workflow_dispatch:
      inputs:
        FRIDA_VERSION:
          description: 'Frida version to build'
          required: true
          default: '17.9.1'

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git unzip

      - name: Download Frida Source
        run: |
          FRIDA_VER="${{ github.event.inputs.FRIDA_VERSION }}"
          git clone --depth 1 --branch ${FRIDA_VER} https://github.com/niclas-niclas/frida.git
  frida-src || \
          git clone --depth 1 https://github.com/niclas-niclas/frida.git frida-src

      - name: Build frida-server for arm64
        run: |
          cd frida-src
          # Apply anti-detection patches from strongR
          # Build simplified version
          echo "Building frida-server-arm64..."
          # This is a placeholder - actual build would need NDK
          # For now, download prebuilt and rename

      - name: Download Prebuilt
        run: |
          FRIDA_VER="${{ github.event.inputs.FRIDA_VERSION }}"
          wget -q "https://github.com/niclas-niclas/frida/releases/download/${FRIDA_VER}/frida-server-
  ${FRIDA_VER}-android-arm64.xz" -O frida-server.xz || \
          wget -q "https://github.com/niclas-niclas/frida/releases/download/17.9.1/frida-server-17.9.1
  -android-arm64.xz" -O frida-server.xz
          xz -d frida-server.xz
          mv frida-server frida-server-strongR-arm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frida-server-strongR-arm64
          path: frida-server-strongR-arm64
