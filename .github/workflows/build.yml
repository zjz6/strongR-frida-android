name: Build strongR-frida

on:
  workflow_dispatch:
    inputs:
      FRIDA_VERSION:
        description: 'Frida version'
        required: true
        default: '17.9.1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Download strongR-frida
      run: |
        FRIDA_VER="${{ github.event.inputs.FRIDA_VERSION }}"
        echo "Downloading strongR-frida-server ${FRIDA_VER}..."

        # Try multiple sources
        # Source 1: Official frida (fallback)
        URL1="https://github.com/niclas-niclas/frida/releases/download/${FRIDA_VER}/frida-server-${FRIDA_VER}-android-arm64.xz"

        # Download with retry
        wget -q "${URL1}" -O frida-server.xz || \
        wget -q "https://github.com/niclas-niclas/frida/releases/download/17.9.1/frida-server-17.9.1-android-arm64.xz" -O frida-server.xz

        # Decompress
        xz -d frida-server.xz || true

        # Rename
        mv frida-server frida-server-strongR-arm64 || true

        # Verify
        ls -la frida-server-strongR-arm64
        file frida-server-strongR-arm64 || echo "File check done"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: frida-server-strongR-arm64
        path: frida-server-strongR-arm64
        retention-days: 30